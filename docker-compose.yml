services:

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins   
    container_name: jenkins_server
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root

  app:
    build: .
    container_name: devops_app
    ports:
      - "3000:3000"
    environment:
      - APP_VERSION=${APP_VERSION}

volumes:
  jenkins_home: