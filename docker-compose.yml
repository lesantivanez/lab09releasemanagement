services:

  blue:
    build: .
    environment:
      - APP_VERSION=${APP_VERSION}
    networks:
      - app_net

  green:
    build: .
    environment:
      - APP_VERSION=${APP_VERSION}
    networks:
      - app_net

  nginx:
    image: nginx:latest
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green
    networks:
      - app_net

networks:
  app_net: